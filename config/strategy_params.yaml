# ============================================================
# STRATEGY PARAMETERS — DAYTRADING ONLY
# - paper 모드에서만 편집 가능
# - live 모드 진입 시 파일 해시가 캡처되며 변조 시 Kill Switch
# - 스캘핑 관련 파라미터는 일체 두지 않는다 (CLAUDE.md §5).
# ============================================================

# --- 스크리닝 점수 가중치 (합 100점) ---
screening:
  threshold: 75    # CLAUDE.md §5.1 SSOT 값. consult 자동튜닝이 70→80→85로 끌어올려 후보 funnel을
                   # 0으로 굶겨(진입 0건) 죽음의 나선(§19) 직전까지 갔던 것을 SSOT로 복원.
  weights:
    turnover_rank: 25       # 전일 거래대금
    opening_gap: 20         # 시가 갭
    ma_alignment: 20        # 이동평균 정배열/위치
    sector_theme: 15        # 업종/테마 모멘텀
    volatility_atr: 20      # ATR 적정 변동성
  penalty:
    bad_news: -20
    administrative_issue: -100   # 사실상 필터

# --- 신호 지표 임계값 (일봉 게이트 + 5분봉 돌파 타점, §5.2 개정) ---
signal:
  volume_surge_multiplier: 3    # (구) 분봉 거래량 임계 — 호환용
  rsi:
    period: 14
    oversold: 30
    overbought: 70
    entry_zone: [50, 72]          # 분봉 매수 타점 RSI 구간 (§5.2) — funnel 완화(65→72)
  macd:
    fast: 12
    slow: 26
    signal: 9
  bollinger:                      # 볼린저밴드 (호환용 — 복합전략에서는 미사용)
    period: 20
    num_std: 2.0
  ma_periods: [5, 20, 60]
  atr_period: 14                  # ATR 기간 (익절 목표가 동적 산출, §5.3)
  # 5분봉 진입 타점 (§5.2 개정)
  breakout:
    lookback: 5                   # 직전 고점 산출 윈도우(직전 N봉) — funnel 완화(10→5)
    volume_mult: 5              # 돌파 캔들 거래량 ≥ 직전 캔들 × 150% — funnel 완화(2.0→1.5)
  # 일봉 추세 게이트 (전부 충족 시에만 진입, §5.2 개정)
  daily:
    ma_period: 20                 # 일봉 종가 > 20MA
    rsi_period: 14
    rsi_min: 50                   # 일봉 RSI ≥ 50
    rsi_overbought: 78            # 일봉 RSI ≥ 78 → 진입 금지 — funnel 완화(70→78)
    recent_days: 3                # 최근 3일 중
    bullish_min: 2                #   양봉 ≥ 2개
    vol_lookback: 5              # 전일 거래량 ≥ 5일 평균 ×
    vol_mult: 1.2                 #   120% — funnel 완화(1.5→1.2)
  # 진입 금지 조건 (§5.2 개정)
  entry_block:
    resistance_pct: 0.005         # 일봉 고점 대비 -0.5% 이내(저항선 근처) → 금지 — funnel 완화(2%→0.5%)
    resistance_lookback: 20       # 저항 산출 일수
    consecutive_down: 3           # 3일 연속 음봉 → 금지
  candle_patterns:
    long: [hammer, bullish_engulfing, long_bullish]
    short: [shooting_star, bearish_engulfing, long_bearish]
  # 진입에 필요한 분봉 타점 충족 개수 (§5.2). 상담(💬)·회의(🤝)에서 "신호 조건 N개로"처럼
  # 자연어로 바꿀 수 있다(StrategyEditor 단일 진입점 → 다음 백테스트/세션부터 반영).
  # 안전범위(editor.TUNE_BOUNDS): 1~4 (분봉 타점은 총 4개) — 범위 밖은 경계로 보정.
  entry_rules:
    strong_min_indicators: 3      # STRONG 판정 기준(=진입 필요 개수). 4개 전부 충족
    conditional_min_indicators: 3 # CONDITIONAL 판정 기준. 3개 충족

# --- 진입 (분할 매수) ---
entry:
  split_ratios_strong: [0.5, 0.3, 0.2]
  conditional_cap_pct: 0.7
  # 1종목 비중 상한 없음. 신용 포함 동적 사이징은 리스크부에서 결정.
  use_margin_when_available: true
  # 포지션 사이징 (리스크부 동적 사이징, §5.3 / §25.3) — 상담(💬)·회의(🤝)에서 조정 가능.
  # 매수금액 = 가용현금 × credit_multiplier × cash_fraction. 안전범위는 editor.TUNE_BOUNDS.
  sizing:
    cash_fraction_strong: 0.7       # STRONG + 일봉 강세: 가용현금 × credit_multiplier × 0.7
    cash_fraction_conditional: 0.4  # CONDITIONAL: × credit_multiplier × 0.4
    credit_multiplier: 2.0          # 신용 포함 매수여력 배수 (가용현금 × 2)

# --- 익절 룰 (3단 구조, CLAUDE.md §5.3) ---
take_profit:
  step1:
    pct_range: [0.02, 0.03]      # +3 ~ +5% (ATR 기반 사전 지정)
    close_ratio: 0.5             # 50% 청산
  step2:
    pct_range: [0.06, 0.08]      # +6 ~ +8% (ATR 기반 사전 지정)
    close_ratio: 0.3             # 30% 청산
  # ATR%(=ATR/현재가) 밴딩: < low → 범위 하단, < high → 중앙, ≥ high → 상단
  atr_bands:
    low: 0.015
    high: 0.030
  step3_trailing:
    trail_from_high_pct: 0.015   # 고점 대비 -1.5% 이탈 시 잔량 전량(§5.3)
    # §5.7 EOD 강제청산: 당일 매수분은 어떤 조건에서도 예외 없이 15:20 전량 청산(이월 금지).
    cutoff_time: "15:20:00"      # 트레일링 종료
    force_close_time: "15:20:00" # 보유분 전량 강제청산 (예외 없음)

# --- 손절 룰 (CLAUDE.md §5.4 개정) ---
# ⚙️ 손절 값은 상담(💬)·회의(🤝)에서 자연어로 바꿀 수 있다(§24). 변경은 StrategyEditor
#    단일 진입점(화이트리스트→leaf 교체→재읽기 검증→git 커밋→ImprovementLog)을 거치며,
#    다음 백테스트/모의투자 세션부터 새 값이 적용된다(ExitParams.from_file). 코드에는
#    하드코딩 값이 없고 본 파일이 단일 진실 공급원이다(아래 값이 곧 운영값).
#    안전범위(core/strategy/editor.py TUNE_BOUNDS): hard_max_pct -10%~-0.5%,
#    technical_buffer_pct 0~5% — 범위 밖 요청은 가장 가까운 경계로 자동 보정.
stop_loss:
  technical_priority: true       # 진입 캔들 저점 이탈 즉시 청산이 최우선
  technical_stop_enabled: true   # 기술적 손절(진입 캔들 저점 이탈) 사용 여부 — off면 하드 손절만
  entry_candle_low_breach: true  # 분봉 종가 < 진입 캔들 저점 → 시장가 청산
  technical_buffer_pct: 0.005    # 진입 캔들 저점 -0.5% 이탈 시(너무 빡빡하지 않게, §5.4 개정)
  signal_breakdown_min_count: 2  # 거래량 소멸/MACD 데드/5MA 이탈 중 2개 이상
  signal_breakdown_grace_minutes: 5  # 진입 직후 유예(분): 분봉 노이즈 즉시청산 방지(§5.6)
  hard_max_pct: -0.025            # 최대 손절 -3%(§5.4)

# --- 타임스톱: 제거됨 (CLAUDE.md §5.5) ---
# 시간 기반 매도(일정 시간 방향이 안 나오면 청산)는 시스템에서 완전히 제거되었다.
# 매도는 오직 익절(TP1/TP2/트레일링)·손절(기술적/하드)·EOD 강제청산(15:20)으로만
# 발동한다. time_stop 섹션은 더 이상 읽히지 않으며, 어떤 코드도 시간 경과를 이유로
# 포지션을 청산하지 않는다.

# --- 운영 모드 (단일) ---
mode_profile:
  daytrading:
    avg_holding_minutes: [30, 180]

version: "0.2.0"
