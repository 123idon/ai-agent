# ============================================================
# STRATEGY PARAMETERS — DAYTRADING ONLY
# - paper 모드에서만 편집 가능
# - live 모드 진입 시 파일 해시가 캡처되며 변조 시 Kill Switch
# - 스캘핑 관련 파라미터는 일체 두지 않는다 (CLAUDE.md §5).
# ============================================================

# --- 스크리닝 점수 가중치 (합 100점) ---
screening:
  threshold: 85
  weights:
    turnover_rank: 25       # 전일 거래대금
    opening_gap: 20         # 시가 갭
    ma_alignment: 20        # 이동평균 정배열/위치
    sector_theme: 15        # 업종/테마 모멘텀
    volatility_atr: 20      # ATR 적정 변동성
  penalty:
    bad_news: -20
    administrative_issue: -100   # 사실상 필터

# --- 신호 지표 임계값 (일봉 게이트 + 5분봉 돌파 타점, §5.2 개정) ---
signal:
  volume_surge_multiplier: 2.5    # (구) 분봉 거래량 임계 — 호환용
  rsi:
    period: 14
    oversold: 30
    overbought: 70
    entry_zone: [50, 65]          # 분봉 매수 타점 RSI 구간 (§5.2)
  macd:
    fast: 12
    slow: 26
    signal: 9
  bollinger:                      # 볼린저밴드 (호환용 — 복합전략에서는 미사용)
    period: 20
    num_std: 2.0
  ma_periods: [5, 20, 60]
  atr_period: 14                  # ATR 기간 (익절 목표가 동적 산출, §5.3)
  # 5분봉 진입 타점 (§5.2 개정)
  breakout:
    lookback: 10                  # 직전 고점 산출 윈도우(직전 N봉)
    volume_mult: 2.0              # 돌파 캔들 거래량 ≥ 직전 캔들 × 200%
  # 일봉 추세 게이트 (전부 충족 시에만 진입, §5.2 개정)
  daily:
    ma_period: 20                 # 일봉 종가 > 20MA
    rsi_period: 14
    rsi_min: 50                   # 일봉 RSI ≥ 50
    rsi_overbought: 70            # 일봉 RSI ≥ 70 → 진입 금지
    recent_days: 3                # 최근 3일 중
    bullish_min: 2                #   양봉 ≥ 2개
    vol_lookback: 5              # 전일 거래량 ≥ 5일 평균 ×
    vol_mult: 1.5                 #   150%
  # 진입 금지 조건 (§5.2 개정)
  entry_block:
    resistance_pct: 0.02          # 일봉 고점 대비 -2% 이내(저항선 근처) → 금지
    resistance_lookback: 20       # 저항 산출 일수
    consecutive_down: 3           # 3일 연속 음봉 → 금지
  candle_patterns:
    long: [hammer, bullish_engulfing, long_bullish]
    short: [shooting_star, bearish_engulfing, long_bearish]
  entry_rules:
    strong_min_indicators: 4      # 분봉 타점 4개 전부
    conditional_min_indicators: 3 # 3개

# --- 진입 (분할 매수) ---
entry:
  split_ratios_strong: [0.5, 0.3, 0.2]
  conditional_cap_pct: 0.7
  # 1종목 비중 상한 없음. 신용 포함 동적 사이징은 리스크부에서 결정.
  use_margin_when_available: true

# --- 익절 룰 (3단 구조, 최소 목표 상향, CLAUDE.md §5.3 개정) ---
take_profit:
  step1:
    pct_range: [0.03, 0.05]      # +3 ~ +5% (ATR 기반 사전 지정)
    close_ratio: 0.4             # 40% 청산
  step2:
    pct_range: [0.06, 0.10]      # +6 ~ +10% (ATR 기반 사전 지정)
    close_ratio: 0.4             # 40% 청산
  # ATR%(=ATR/현재가) 밴딩: < low → 범위 하단, < high → 중앙, ≥ high → 상단
  atr_bands:
    low: 0.015
    high: 0.030
  step3_trailing:
    trail_from_high_pct: 0.02    # 고점 대비 -2% 이탈 시 잔량 전량(§5.3 개정)
    # §5.7 EOD 강제청산: 당일 매수분은 어떤 조건에서도 예외 없이 15:20 전량 청산(이월 금지).
    cutoff_time: "15:20:00"      # 트레일링 종료
    force_close_time: "15:20:00" # 보유분 전량 강제청산 (예외 없음)

# --- 손절 룰 (CLAUDE.md §5.4 개정) ---
stop_loss:
  technical_priority: true       # 진입 캔들 저점 이탈 즉시 청산이 최우선
  entry_candle_low_breach: true  # 분봉 종가 < 진입 캔들 저점 → 시장가 청산
  technical_buffer_pct: 0.005    # 진입 캔들 저점 -0.5% 이탈 시(너무 빡빡하지 않게, §5.4 개정)
  signal_breakdown_min_count: 2  # 거래량 소멸/MACD 데드/5MA 이탈 중 2개 이상
  signal_breakdown_grace_minutes: 5  # 진입 직후 유예(분): 분봉 노이즈 즉시청산 방지(§5.6)
  hard_max_pct: -0.02            # 최대 손절 -2%(기존 -3%에서 축소, §5.4 개정)

# --- 타임스톱 (CLAUDE.md §5.5 개정) ---
time_stop:
  evaluation_minutes: 15        # 30분 경과 시 재평가
  min_profit_pct: 0.01          # 30분 내 +1% 미달 시 50% 청산(기준 상향)
  flat_box_pct: 0.005           # (구) ±박스 — 호환용·미사용
  count_as_stoploss: false       # 연속손절 카운터에 산입 X

# --- 운영 모드 (단일) ---
mode_profile:
  daytrading:
    avg_holding_minutes: [30, 180]

version: "0.2.0"
