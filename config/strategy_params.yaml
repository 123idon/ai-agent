# ============================================================
# STRATEGY PARAMETERS — DAYTRADING ONLY
# - paper 모드에서만 편집 가능
# - live 모드 진입 시 파일 해시가 캡처되며 변조 시 Kill Switch
# - 스캘핑 관련 파라미터는 일체 두지 않는다 (CLAUDE.md §5).
# ============================================================

# --- 스크리닝 점수 가중치 (합 100점) ---
screening:
  threshold: 70
  weights:
    turnover_rank: 25       # 전일 거래대금
    opening_gap: 20         # 시가 갭
    ma_alignment: 20        # 이동평균 정배열/위치
    sector_theme: 15        # 업종/테마 모멘텀
    volatility_atr: 20      # ATR 적정 변동성
  penalty:
    bad_news: -20
    administrative_issue: -100   # 사실상 필터

# --- 신호 지표 임계값 (기술적 매수 타점, §5.2) ---
signal:
  volume_surge_multiplier: 1.5    # 직전 20분 평균 대비 ≥ 200%
  rsi:
    period: 14
    oversold: 30
    overbought: 70
    entry_zone: [50, 65]          # 매수 타점 RSI 구간 (§5.2)
  macd:
    fast: 12
    slow: 26
    signal: 9
  bollinger:                      # 볼린저밴드 (하단 반등/중단 돌파)
    period: 20
    num_std: 2.0
  ma_periods: [5, 20, 60]
  atr_period: 14                  # ATR 기간 (익절 목표가 동적 산출, §5.3)
  candle_patterns:
    long: [hammer, bullish_engulfing, long_bullish]
    short: [shooting_star, bearish_engulfing, long_bearish]
  entry_rules:
    strong_min_indicators: 4
    conditional_min_indicators: 3

# --- 진입 (분할 매수) ---
entry:
  split_ratios_strong: [0.5, 0.3, 0.2]
  conditional_cap_pct: 0.7
  # 1종목 비중 상한 없음. 신용 포함 동적 사이징은 리스크부에서 결정.
  use_margin_when_available: true

# --- 익절 룰 (3단 구조, CLAUDE.md §5.3) ---
take_profit:
  step1:
    pct_range: [0.03, 0.05]      # +3 ~ +5% (ATR 기반 사전 지정)
    close_ratio: 0.5
  step2:
    pct_range: [0.06, 0.08]      # +6 ~ +8% (ATR 기반 사전 지정)
    close_ratio: 0.3
  # ATR%(=ATR/현재가) 밴딩: < low → 범위 하단, < high → 중앙, ≥ high → 상단
  atr_bands:
    low: 0.015
    high: 0.030
  step3_trailing:
    trail_from_high_pct: 0.015   # 고점 대비 -1.5% 이탈 시 전량
    cutoff_time: "15:20:00"
    force_close_time: "15:25:00"

# --- 손절 룰 (CLAUDE.md §5.4) ---
stop_loss:
  technical_priority: true       # 진입 캔들 저점 이탈 즉시 청산이 최우선
  entry_candle_low_breach: true  # 1분봉 종가 < 진입 캔들 저점 → 시장가 청산
  signal_breakdown_min_count: 2  # 거래량 소멸/MACD 데드/5MA 이탈 중 2개 이상
  signal_breakdown_grace_minutes: 5  # 진입 직후 유예(분): 1분봉 노이즈 즉시청산 방지(§5.6)
  hard_max_pct: -0.03            # 안전 하한 (기술적 트리거가 늦을 때만)

# --- 타임스톱 (CLAUDE.md §5.5) ---
time_stop:
  evaluation_minutes: 10
  flat_box_pct: 0.75            # ±0.5% 방향 미발생 시 50% 축소 또는 청산
  count_as_stoploss: false       # 연속손절 카운터에 산입 X

# --- 운영 모드 (단일) ---
mode_profile:
  daytrading:
    avg_holding_minutes: [30, 180]

version: "0.2.0"
